name: KO1KEYS Watch

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r KO1KEYS/collector/requirements.txt

      - name: Run collector
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SEARCH_KEYWORD: ${{ vars.SEARCH_KEYWORD }}
          X_MIN_LIKES: ${{ vars.X_MIN_LIKES }}
          X_MIN_RETWEETS: ${{ vars.X_MIN_RETWEETS }}
        run: python KO1KEYS/collector/main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add KO1KEYS/collector/state.json
          git diff --cached --quiet || git commit -m "Update KO1KEYS watch state [skip ci]"
          git push
